apiVersion: apps/v1
kind: Deployment
metadata: { name: milstdlint, labels: { app: milstdlint } }
spec:
  replicas: 1
  selector: { matchLabels: { app: milstdlint } }
  template:
    metadata: { labels: { app: milstdlint } }
    spec:
      containers:
        - name: milstdlint
          image: ghcr.io/cognis-digital/milstdlint:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: milstdlint }
spec:
  selector: { app: milstdlint }
  ports: [{ port: 80, targetPort: 8000 }]
